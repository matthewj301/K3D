pause_on_runout: True
runout_distance:400
runout_gcode:
  PAUSE
  M117 Filament runout detected.
insert_gcode:
  M117 Filament load detected.
  
[filament_motion_sensor encoder_sensor]
switch_pin: ^PG9
detection_length: 3
extruder: extruder
pause_on_runout: False
smart: True