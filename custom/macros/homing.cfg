[gcode_macro HOME_X]
description: Home X and park X at bed center (stateless)
gcode:
  RESPOND MSG="HOME_X: calling G28.1 X"
  G28.1 X
  _CENTER_AXIS AXIS=X

[gcode_macro HOME_Y]
description: Home Y and park Y at bed center (stateless)
gcode:
  RESPOND MSG="HOME_Y: calling G28.1 Y"
  G28.1 Y
  _CENTER_AXIS AXIS=Y

# Center a single axis after homing (relative Δ; CoreXY-safe)
[gcode_macro _CENTER_AXIS]
description: Center a single axis after homing (stateless)
gcode:
  {% set axis = params.AXIS|string|upper %}
  {% set v = printer["gcode_macro _PRINTER_VARS"] %}
  {% set f = ((v.safe_travel_xy_speed if v.safe_travel_xy_speed is defined else v.travel_speed)|float * 60)|int %}
  {% set cx = (printer.toolhead.axis_minimum.x|float + printer.toolhead.axis_maximum.x|float)/2.0 %}
  {% set cy = (printer.toolhead.axis_minimum.y|float + printer.toolhead.axis_maximum.y|float)/2.0 %}

  {% if axis == "X" and "x" in printer.toolhead.homed_axes %}
    {% set dx = cx - (printer.gcode_move.position.x|float) %}
    RESPOND MSG="CENTER: X → {cx}"
    G91
    G0 X{dx} F{f}
    G90
  {% elif axis == "Y" and "y" in printer.toolhead.homed_axes %}
    {% set dy = cy - (printer.gcode_move.position.y|float) %}
    RESPOND MSG="CENTER: Y → {cy}"
    G91
    G0 Y{dy} F{f}
    G90
  {% endif %}

# ---- ONE PRE-HOP + ONE POST-HOP HOMING ORCHESTRATOR ----
# Requirements:
#   • Remove/disable [safe_z_home] (or set its z_hop to 0) — we handle XY staging + hops here.
#   • Set homing_retract_dist: 0 on all Z steppers to avoid extra “rebound” hop.
#   • Optional: if you want the pre-hop even when Z is unhomed, enable:
#       [force_move]
#       enable_force_move: True
#
# Tunables used from [_PRINTER_VARS]:
#   safe_travel_xy_speed   (mm/s)
#   safe_travel_z_speed    (mm/s)
#   z_hop_height           (mm)   -> pre-hop
#   z_post_hop_height      (mm)   -> post-hop (falls back to z_hop_height if missing)

[homing_override]
axes: xyz
gcode:
  {% set v     = printer["gcode_macro _PRINTER_VARS"] %}
  {% set fxy   = ((v.safe_travel_xy_speed if v.safe_travel_xy_speed is defined else v.travel_speed)|float * 60)|int %}
  {% set fz    = ((v.safe_travel_z_speed  if v.safe_travel_z_speed  is defined else 15)|float * 60)|int %}
  {% set hop_pre  = v.z_hop_height|float %}
  {% set hop_post = (v.z_post_hop_height if v.z_post_hop_height is defined else v.z_hop_height)|float %}
  {% set min_x = printer.toolhead.axis_minimum.x|float %}
  {% set max_x = printer.toolhead.axis_maximum.x|float %}
  {% set min_y = printer.toolhead.axis_minimum.y|float %}
  {% set max_y = printer.toolhead.axis_maximum.y|float %}
  {% set cx = (min_x + max_x)/2.0 %}
  {% set cy = (min_y + max_y)/2.0 %}
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set safe_pre  = [hop_pre,  max_z - 2]|min %}
  {% set safe_post = [hop_post, max_z - 2]|min %}

  {% set no_args = (rawparams|trim == "") %}
  {% set want_x  = (params.X is defined) or no_args %}
  {% set want_y  = (params.Y is defined) or no_args %}
  {% set want_z  = (params.Z is defined) or no_args %}

  # --- single coordinated PRE-HOP ---
  {% if safe_pre > 0 %}
    {% if "z" in printer.toolhead.homed_axes %}
      G91
      G0 Z{safe_pre} F{fz}
      G90
    {% else %}
      # make a legal coordinated Z move, then leave Z logically unhomed
      SET_KINEMATIC_POSITION Z=0
      G91
      G0 Z{safe_pre} F{fz}
      G90
      SET_KINEMATIC_POSITION Z=0
    {% endif %}
  {% endif %}

  # --- X: home then center X (center logic runs in its own macro, after homing) ---
  {% if want_x %}
    G28 X
    _CENTER_AXIS AXIS=X
  {% endif %}

  # --- Y: home then center Y ---
  {% if want_y %}
    G28 Y
    _CENTER_AXIS AXIS=Y
  {% endif %}

  # --- Z: stage to center, home, then single POST-HOP ---
  {% if want_z %}
    {% if "x" not in printer.toolhead.homed_axes %} G28 X {% endif %}
    {% if "y" not in printer.toolhead.homed_axes %} G28 Y {% endif %}
    G90
    G0 X{cx} Y{cy} F{fxy}
    G28 Z
    {% if safe_post > 0 %}
      G91
      G0 Z{safe_post} F{fz}
      G90
    {% endif %}
  {% endif %}