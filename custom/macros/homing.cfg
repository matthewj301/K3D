# Helper: center a single axis AFTER it’s homed (relative Δ; CoreXY-safe)
[gcode_macro _CENTER_AXIS]
description: Center a single axis after homing
gcode:
  {% set axis = params.AXIS|string|upper %}
  {% set vars  = printer["gcode_macro _PRINTER_VARS"] %}
  {% set f  = ((vars.travel_speed if vars.travel_speed is defined else vars.travel_speed)|float * 60)|int %}
  {% set cx = (printer.toolhead.axis_minimum.x|float + printer.toolhead.axis_maximum.x|float)/2.0 %}
  {% set cy = (printer.toolhead.axis_minimum.y|float + printer.toolhead.axis_maximum.y|float)/2.0 %}
  {% if axis == "X" %}
    {% set dx = cx - (printer.gcode_move.position.x|float) %}
    G91
    G0 X{dx} F{f}
    G90
  {% elif axis == "Y" %}
    {% set dy = cy - (printer.gcode_move.position.y|float) %}
    G91
    G0 Y{dy} F{f}
    G90
  {% endif %}

[gcode_macro G28]
rename_existing: G28.1
description: Smart homing with single pre/post Z hop and RatOS-style XY centering
gcode:
  {% set v        = printer["gcode_macro _PRINTER_VARS"] %}
  {% set fxy      = ((vars.travel_speed if vars.travel_speed is defined else vars.travel_speed)|float * 60)|int %}
  {% set fz       = ((vars.z_travel_speed  if vars.z_travel_speed  is defined else 15)|float * 60)|int %}
  {% set hop_pre  = vars.z_hop_height|float %}
  {% set hop_post = (vars.z_post_hop_height if vars.z_post_hop_height is defined else vars.z_hop_height)|float %}

  {% set min_x = printer.toolhead.axis_minimum.x|float %}
  {% set max_x = printer.toolhead.axis_maximum.x|float %}
  {% set min_y = printer.toolhead.axis_minimum.y|float %}
  {% set max_y = printer.toolhead.axis_maximum.y|float %}
  {% set cx = (min_x + max_x)/2.0 %}
  {% set cy = (min_y + max_y)/2.0 %}
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set safe_pre  = [hop_pre,  max_z - 2]|min %}
  {% set safe_post = [hop_post, max_z - 2]|min %}

  {% set no_args = (rawparams|trim == "") %}
  {% set want_x  = (params.X is defined) or no_args %}
  {% set want_y  = (params.Y is defined) or no_args %}
  {% set want_z  = (params.Z is defined) or no_args %}

  # local flags to remember what we homed in this call
  {% set hx = 0 %}
  {% set hy = 0 %}

  # --- single coordinated PRE-HOP (all Z steppers together) ---
  {% if safe_pre > 0 %}
    {% if "z" in printer.toolhead.homed_axes %}
      G91
      G0 Z{safe_pre} F{fz}
      G90
    {% else %}
      # allow a legal kinematic Z move before homing (doesn’t rack the gantry)
      SET_KINEMATIC_POSITION Z=0
      G91
      G0 Z{safe_pre} F{fz}
      G90
      # do NOT touch kinematics again; we’ll truly home Z below
    {% endif %}
  {% endif %}

  # --- X: stock home then center X only ---
  {% if want_x %}
    G28.1 X
    {% set hx = 1 %}
    _CENTER_AXIS AXIS=X
  {% endif %}

  # --- Y: stock home then center Y only ---
  {% if want_y %}
    G28.1 Y
    {% set hy = 1 %}
    _CENTER_AXIS AXIS=Y
  {% endif %}

  # --- Z: ensure XY are homed (only if we DIDN’T already), stage to center, home Z, then POST-HOP ---
  {% if want_z %}
    {% if not hx and "x" not in printer.toolhead.homed_axes %}
      G28.1 X
      _CENTER_AXIS AXIS=X
      {% set hx = 1 %}
    {% endif %}
    {% if not hy and "y" not in printer.toolhead.homed_axes %}
      G28.1 Y
      _CENTER_AXIS AXIS=Y
      {% set hy = 1 %}
    {% endif %}

    G90
    G0 X{cx} Y{cy} F{fxy}
    G28.1 Z

    {% if safe_post > 0 %}
      G91
      G0 Z{safe_post} F{fz}
      G90
    {% endif %}
  {% endif %}
