# =====================
# PRINT_START (Beacon-aware, KAMP-aware, no hard-coded units)
# =====================
[gcode_macro PRINT_START]
description: Start the print
variable_is_printing_gcode: False
gcode:
  SAVE_GCODE_STATE NAME=STATE_PRINT_START
  SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=is_printing_gcode VALUE=True


  {% set vars = printer["gcode_macro _PRINTER_VARS"] %}
  {% set bed_temp = params.BED_TEMP|default(0)|float %}
  {% set hotend_temp = params.HOTEND_TEMP|default(0)|float %}
  {% set chamber_target_temp = params.TARGET_CHAMBER_TEMP|default(0)|float %}

  {% set mat = params.MATERIAL|default(vars.current_material)|string|upper %}

  {% set travel_f = (vars.travel_speed|float * 60)|int %}
  {% set z_f = (vars.z_travel_speed|float * 60)|int %}
  {% set max_z = printer.toolhead.axis_maximum.z|float %}

  {% set hop = [vars.z_hop_height|float, max_z - 2]|min %}

  SET_GCODE_VARIABLE MACRO=_PRINTER_VARS VARIABLE=current_material VALUE="{mat}"

  RESET_MULTIPLIERS
  MAYBE_LOAD_SKEW_CORRECTION

  # Always home XY (and implicitly move to center of bed) no matter the probe. If already homed, z_hop and move to the center of the bed
  {% if printer.toolhead.homed_axes != "xy" %}
        G28 XY                                                                                     # Partial home (XY)
    {% else %}
        G1 Z{hop} F{z_hop_speed}                                                              # Moves to z_hop height
        G1 X{cx} Y{cy} F{travel_f}                                                         # Goes to center of the bed
  {% endif %}
  G90    

  BED_MESH_CLEAR
  SET_GCODE_OFFSET Z=0
  
  {% if "beacon" in printer.configfile.settings %}
    # Let PREHEAT orchestrate heating and (for high-temp) toolhead-assisted mixing at 150C
    PREHEAT BED_TEMP={bed_temp} HOTEND_TEMP={printer["gcode_macro BEACON_VARS"].beacon_contact_calibration_temp|int} MATERIAL="{mat}" QUICK=0 TARGET_CHAMBER_TEMP={chamber_target_temp}
    # Home Z with Beacon contact - calibrate z-offset and geneate new model (Should be done hot, hense after PREHEAT)
    G28 Z METHOD=CONTACT CALIBRATE=1                                                          # Calibrate z offset only after tilt/mesh
  {% else %}
    # Home Z, no need to wait for special beacon stuff.  
    G28 Z
    # No Beacon: let PREHEAT drive either simple warmup or mixing based on MATERIAL/thresholds
    PREHEAT BED_TEMP={bed_temp} HOTEND_TEMP={hotend_temp} MATERIAL="{mat}" QUICK=0 TARGET_CHAMBER={chamber_target_temp}
  {% endif %}

  # Level everything out
  {% if "quad_gantry_level" in printer.configfile.settings %}
    QUAD_GANTRY_LEVEL
  {% elif "z_tilt" in printer.configfile.settings %}
    Z_TILT_ADJUST
  {% else %}
    RESPOND MSG="No gantry leveling module detected - skipping."
  {% endif %}
  
  # KAMP or default Beacon mesh depending on what you have configured
  {% if "bed_mesh" in printer.configfile.settings %}
    RESPOND MSG="Starting bed mesh calibration..."
    BED_MESH_CALIBRATE
  {% endif %}


  {% if "beacon" in printer.configfile.settings %}
    # Home Z with Beacon contact - just calibrate z-offset after leveling everything
    G28 Z METHOD=CONTACT CALIBRATE=0 
  {% endif %}

  # Heats up nozzle to target
  SET_DISPLAY_TEXT MSG="Heating hotend to {target_extruder}c"                                 # Displays info
  {% if printer.configfile.config["gcode_macro SMART_PARK"] is defined %}
      SMART_PARK                                                                              # Parks using KAMP
  {% else %}
      PICK_PARK_LOCATION
  {% endif %}

  # Wait for final print temp
  M109 S{hotend_temp}

  # Apply thermal expansion compensation is present
  {% if printer.configfile.config["gcode_macro _BEACON_SET_NOZZLE_TEMP_OFFSET"] is defined %}
    RESPOND MSG="Setting Beacon thermal expansion compensation"
    _BEACON_SET_NOZZLE_TEMP_OFFSET                                                          # Adds toolhead expansion offset (REQUIRES ADDITIONAL MACROS NOT BY DEFAULT Found at:https://github.com/YanceyA/Beacon_Thermal_Expansion_Compensation )
  {% endif %}

  SET_GCODE_OFFSET Z_ADJUST=0  

  # Purge strategy
  {% if "LINE_PURGE" in printer.gcode.commands %}
    RESPOND MSG="Starting line purge..."
    LINE_PURGE
  {% else %}
      RESPOND MSG="Starting fallback line purge..."
    _FALLBACK_PURGE LENGTH={vars.purge_line_length} SPEED={vars.purge_speed}
  {% endif %}

  RESPOND MSG="Starting Print..."
  G90
  RESTORE_GCODE_STATE NAME=STATE_PRINT_START

# =====================
# PRINT_END (unit-safe; avoids duplicate M84)
# =====================
[gcode_macro PRINT_END]
description: Consistent end-of-print routine. reason codes: 0 = cancelled, 1 = completed
gcode:
  {% set reason = params.REASON|default("complete")|lower %}
  {% set reason_code = 1 if reason == "complete" else 0 %}

  SAVE_GCODE_STATE NAME=STATE_PRINT_END
  {% set vars = printer["gcode_macro _PRINTER_VARS"] %}
  {% set f_xy = (v.travel_speed|float * 60)|int %}
  {% set f_z  = (v.z_travel_speed|float  * 60)|int %}
  {% set retract_speed = (v.retract_speed|float*60)|int %}
  {% set retract_length = v.end_retract_length|float %}

  # z bounds
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set hop = [v.z_hop_height|float, max_z - 2]|min %}

  M400
  G92 E0

  {% if printer.extruder.can_extrude %}
    G91
    G1 E-{retract_length} F{retract_speed}
    G90
  {% endif %}

  PICK_PARK_LOCATION

  {% if "beacon" in printer.configfile.settings %}
    _BEACON_REMOVE_NOZZLE_TEMP_OFFSET
  {% endif %}

  # Clear mesh, cool down in a controlled way
  {% if "bed_mesh" in printer.configfile.settings %}
    BED_MESH_CLEAR
  {% endif %}

  M104 S0
  DISABLE_XY
  COOLDOWN_SEQUENCE QUICK={reason_code}
  ALL_FANS_OFF
  TURN_OFF_HEATERS
  M84  # All Motors off
  RESET_MULTIPLIERS

  SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=is_printing_gcode VALUE=False
  RESTORE_GCODE_STATE NAME=STATE_PRINT_END MOVE=0


[gcode_macro _PAUSE_STATE]
variable_prev_hotend_target: 0.0
variable_used_a_standby_temp: False
variable_was_homed: 0
gcode:

[gcode_macro PAUSE]
rename_existing: PAUSE_BASE
gcode:
  {% if printer.pause_resume.is_paused %}
    {action_respond_info("Already paused...")}
  {% else %}


    PAUSE_BASE
    {% set v   = printer["gcode_macro _PRINTER_VARS"] %}
    {% set fxy = (v.travel_speed|float * 60)|int %}
    {% set fz  = (v.z_travel_speed|float  * 60)|int %}

    # z bounds
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set hop = [v.z_hop_height|float, max_z - 2]|min %}
    {% set retract_speed = (v.retract_speed|float*60)|int %}
    {% set retract_length = v.end_retract_length|float %}


  # Set idle timeout
  SET_IDLE_TIMEOUT TIMEOUT={v.pause_idle_timeout}
  RESPOND MSG="Setting idle timeout to {v.pause_idle_timeout} seconds."

    PICK_PARK_LOCATION

    {% if printer.extruder.can_extrude %}
      G91
      G1 E-{retract_length} F{retract_speed}
      G90
    {% endif %}

    M107  ; part cooling off

    # Hotend standby (drop, but not below pause_min_standby_temp)
    {% set printing_target_temp = printer.extruder.target|float %}
    {% set used_a_standby_temp = False %}
    {% if printing_target_temp > 0 and v.pause_standby_extruder_delta|int > 0 %}
      {% set standby_target_temp = [printing_target_temp - v.pause_standby_extruder_delta|float, v.pause_min_standby_temp|float]|max %}
      {% if standby_target_temp < printing_target_temp %}
        M104 S{standby_target_temp}
        {% set used_a_standby_temp = True %}
      {% endif %}
    {% endif %}

    SET_GCODE_VARIABLE MACRO=_PAUSE_STATE VARIABLE=used_a_standby_temp VALUE={used_a_standby_temp}
    SET_GCODE_VARIABLE MACRO=_PAUSE_STATE VARIABLE=prev_hotend_target VALUE={printing_target_temp}
    SET_GCODE_VARIABLE MACRO=_PAUSE_STATE VARIABLE=was_homed VALUE={(1 if ("x" in printer.toolhead.homed_axes and "y" in printer.toolhead.homed_axes and "z" in printer.toolhead.homed_axes) else 0)}
  {% endif %}

[gcode_macro RESUME]
rename_existing: RESUME_BASE
gcode:
  {% set vars = printer["gcode_macro _PRINTER_VARS"] %}
  {% set used_a_standby_temp = printer["gcode_macro _PAUSE_STATE"].used_a_standby_temp|int %}
  {% set printing_target_temp = printer["gcode_macro _PAUSE_STATE"].prev_hotend_target|float %}
  {% if used_a_standby_temp and printing_target_temp > 0 %} RESPOND MSG="Resuming: heating hotend back to {printing_target_temp}C"
    M109 S{printing_target_temp}
  {% endif %}
  {% set retract_speed = (v.retract_speed|float*60)|int %}
  {% set retract_length = v.end_retract_length|float %}

  {% if printer.extruder.can_extrude %}
    G91
    G1 E-{retract_length} F{retract_speed}
    G90
  {% endif %}

  RESUME_BASE

[gcode_macro CANCEL_PRINT]
rename_existing: CANCEL_PRINT_BASE
gcode:
  PRINT_END REASON=cancel
  CANCEL_PRINT_BASE


[gcode_macro M600]
gcode: 
	SAVE_GCODE_STATE NAME=M600
	UNLOAD_FILAMENT
	SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=m600 VALUE=1
	PAUSE
	RESTORE_GCODE_STATE NAME=M600