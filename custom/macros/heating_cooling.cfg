# =====================
# PREHEAT (uses material presets + dynamic chamber handling)
# =====================
[gcode_macro PREHEAT]
description: Preheat bed/hotend, manage chamber fans based on material
# Usage: PREHEAT BED_TEMP= S HOTEND_TEMP= S MATERIAL="ABS"
variable_target_bed: 0
variable_target_hotend: 0
variable_quick: 0
variable_target_chamber: 0
variable_mins: 0
variable_printhood_assist: 0
variable_use_dyn: 1
variable_mswap: 0
variable_oldmat: "N/A"
gcode:
  {% set vars = printer["gcode_macro _PRINTER_VARS"] %}
  {% set bed = params.BED_TEMP|default(0)|float %}
  {% set hot = params.HOTEND_TEMP|default(0)|float %}
  {% if 'MATERIAL' not in params %}
    RESPOND TYPE=error MSG="PREHEAT recommends passing in MATERIAL. Falling back to stored material." 
    {% set mat = vars.current_material|string|upper %}
  {% else %}
    {% set mat = params.MATERIAL|string|upper %}
  {% endif %}
  {% set quick = params.QUICK|default(0)|int %}
  SET_GCODE_VARIABLE MACRO=PREHEAT VARIABLE=target_bed VALUE={bed}
  SET_GCODE_VARIABLE MACRO=PREHEAT VARIABLE=target_hotend VALUE={hot}
  SET_GCODE_VARIABLE MACRO=PREHEAT VARIABLE=quick VALUE={quick}

  # Update material state if changed
  {% set old = vars.current_material|string|upper %}
  {% set changed = 1 if mat != old else 0 %}
  SET_GCODE_VARIABLE MACRO=PREHEAT VARIABLE=mswap VALUE={changed}
  SET_GCODE_VARIABLE MACRO=PREHEAT VARIABLE=oldmat VALUE="{old}"
  SET_GCODE_VARIABLE MACRO=_PRINTER_VARS VARIABLE=current_material VALUE="{mat}"

  # Chamber assist logic (derived)
  {% set assist_threshold = vars.chamber_assist_temp|float %}
  {% set assist = 1 if bed >= assist_threshold else 0 %}
  SET_GCODE_VARIABLE MACRO=PREHEAT VARIABLE=printhood_assist VALUE={assist}

  # Decide dynamic chamber mode
  {% set high_mats = vars.high_temp_materials.split(",") %}
  {% set use_dyn = 1 if (mat in high_mats or bed >= vars.high_temp_threshold|float) else 0 %}
  {% if quick == 1 %}
    {% set use_dyn = 0 %}
  {% endif %}
  SET_GCODE_VARIABLE MACRO=PREHEAT VARIABLE=use_dyn VALUE={use_dyn}

  RESPOND MSG="PREHEAT → Bed:{bed}C Hotend:{hot}C Material:{mat} (changed:{changed})"

  # Kick off heaters
  M140 S{bed}
  {% if hot > 0 %}
    M104 S{hot}
  {% endif %}

  # Manage chamber & assist fans during preheat
  {% if use_dyn %}
    TOOLHEAD_ASSISTED_CHAMBER_HEATING CHAMBER={params.TARGET_CHAMBER|default(35)} BED={bed} PRINTHEAD_TEMP={(hot if hot > 0 else _PRINTER_VARS.chamber_printhead_temp)}
  {% else %}
    {% if assist == 1 %}
      CHAMBER_FANS_ON
    {% else %}
      CHAMBER_FANS_OFF
    {% endif %}
  {% endif %}

  # Wait to target temps if requested (QUICK=0)
  {% if quick == 0 %}
    {% if bed > 0 %} M190 S{bed} {% endif %}
    {% if hot > 0 %} M109 S{hot} {% endif %}
  {% endif %}

  # Optional soak
  {% set warp_list = vars.warp_prone_materials.split(",") %}
  {% set mins = (vars.high_temp_heat_soak_time if mat in warp_list or bed >= vars.high_temp_threshold|float else vars.standard_heat_soak_time)|int %}
  {% if quick == 0 and mins > 0 %}
    RESPOND MSG="Heat soak: {mins} minutes"
    G4 P{mins * 60 * 1000}
  {% endif %}

    RESPOND MSG="PREHEAT complete."


# =====================
# COOLDOWN_SEQUENCE (adds explicit hotend-off guard; no duplicate M84)
# =====================
[gcode_macro COOLDOWN_SEQUENCE]
description: Cooldown with or without chamber wait
variable_target_chamber: 35
gcode:
    {% set vars = printer["gcode_macro _PRINTER_VARS"] %}
    {% set material = vars.current_material|string|upper %}
    {% set warp_materials = vars.warp_prone_materials|string|upper %}
    {% set target_chamber = params.TARGET_CHAMBER|default(35)|float %}
    {% set bed_temp = printer.heater_bed.temperature %}

    {% set needs_controlled_cooldown = material in warp_materials %}
    {% set quick = params.QUICK|default(0)|int %}

    {% if not needs_controlled_cooldown or quick = 1 %}
        {% if not needs_controlled_cooldown %}
            RESPOND MSG="Material '{material}' doesn't warp - skipping controlled cooldown"
        {% else %}
            RESPOND MSG="Quick cooldown selected - skipping controlled cooldown"
        {% endif %}

        # Quick shutdown
        M104 S0  # Extruder off
        M140 S0  # Bed off immediately

        # Run filter for a few minutes to clear any fumes
        {% if v.filter != "" %}
            RESPOND MSG="Running filtration for 3 minutes..."
            UPDATE_DELAYED_GCODE ID=FILTER_DELAYED_STOP DURATION=180
        {% endif %}

        ALL_FANS_OFF
        RESPOND MSG="Quick cooldown complete for {material}"

    {% else %}
        # Controlled cooldown for warp-prone materials (ABS/ASA/PC/NYLON)
        RESPOND MSG="Starting controlled cooldown for {material} (prevents warping)"
        RESPOND MSG="Chamber: temp → {target_chamber}C (bed: {bed_temp:.1f}C)"

        # Chamber fans off except for filter
        CHAMBER_HEATING_FANS_OFF

        # Phase 1: Gradual bed cooldown to prevent warping
        {% if bed_temp > 60 %}
            RESPOND MSG="Phase 1: Gradual bed cooldown (warp prevention for {material})"
            {% set cooldown_steps = [(bed_temp * 0.8)|int, (bed_temp * 0.6)|int, (bed_temp * 0.4)|int, 40] %}

            {% for temp in cooldown_steps %}
                RESPOND MSG="Bed cooling to {temp}C..."
                M190 S{temp}
                G4 S180  # Wait 3 mins at each step after bed has reached cooldown temp
            {% endfor %}

            M140 S0  # Finally turn off bed
        {% endif %}

        # Phase 2: Chamber circulation
        RESPOND MSG="Phase 2: Chamber circulation"
        CHAMBER_FANS_ON

        RESPOND MSG="Running circulation and filtration for 10 minutes..."
        UPDATE_DELAYED_GCODE ID=FILTER_DELAYED_STOP DURATION=600

        # Phase 3: Shutdown
        RESPOND MSG="Phase 3: System shutdown"
        ALL_FANS_OFF
        TURN_OFF_HEATERS
        M84  # Motors off

        RESPOND MSG="Controlled cooldown complete for {material}!"
    {% endif %}




    {% if "temperature_sensor chamber" in printer %}
      RESPOND MSG="Controlled cooldown: holding until chamber <= {v.high_temp_threshold|int - 5}C"
      TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MAXIMUM={v.high_temp_threshold|int - 5}
    {% else %}
      RESPOND MSG="No chamber sensor; using timed filtration."
      CHAMBER_HEATING_FANS_OFF
      UPDATE_DELAYED_GCODE ID=FILTER_DELAYED_STOP DURATION=900
    {% endif %}
    RESPOND MSG="Stepping bed down to 0C"
    M190 S60
    M190 S45
    M190 S0
  {% endif %}
  ALL_CHAMBER_FANS_OFF
  M107
  M84