# =====================
# CHAMBER fan orchestration (names must be [fan_generic] in config)
# =====================
[gcode_macro CHAMBER_FANS_ON]
description: Turn ON chamber heating fans (assist warm-up)
variable_chamber_fan1: ""
variable_chamber_fan2: ""
variable_bed_fan: ""
variable_nevermore_fan1: ""
variable_nevermore_fan2: ""
gcode:
  {% set v = printer["gcode_macro _PRINTER_VARS"] %}
  {% if v.chamber_fan1 %} SET_FAN_SPEED FAN={v.chamber_fan1} SPEED=1.0 {% endif %}
  {% if v.chamber_fan2 %} SET_FAN_SPEED FAN={v.chamber_fan2} SPEED=1.0 {% endif %}
  {% if v.bed_fan %}       SET_FAN_SPEED FAN={v.bed_fan}       SPEED=1.0 {% endif %}
  {% if v.nevermore_fan1 %}SET_FAN_SPEED FAN={v.nevermore_fan1} SPEED=0.0 {% endif %}
  {% if v.nevermore_fan2 %}SET_FAN_SPEED FAN={v.nevermore_fan2} SPEED=0.0 {% endif %}

[gcode_macro CHAMBER_FANS_OFF]
description: Turn OFF chamber heating fans and enable filtration (naming kept for compatibility)
variable_chamber_fan1: ""
variable_chamber_fan2: ""
variable_bed_fan: ""
variable_nevermore_fan1: ""
variable_nevermore_fan2: ""
gcode:
  {% set v = printer["gcode_macro _PRINTER_VARS"] %}
  {% if v.chamber_fan1 %} SET_FAN_SPEED FAN={v.chamber_fan1} SPEED=0.0 {% endif %}
  {% if v.chamber_fan2 %} SET_FAN_SPEED FAN={v.chamber_fan2} SPEED=0.0 {% endif %}
  {% if v.bed_fan %}       SET_FAN_SPEED FAN={v.bed_fan}       SPEED=1.0 {% endif %}
  {% if v.nevermore_fan1 %}SET_FAN_SPEED FAN={v.nevermore_fan1} SPEED=1.0 {% endif %}
  {% if v.nevermore_fan2 %}SET_FAN_SPEED FAN={v.nevermore_fan2} SPEED=1.0 {% endif %}

[gcode_macro ALL_CHAMBER_FANS_OFF]
description: Hard stop all chamber/bed/nevermore fans
variable_chamber_fan1: ""
variable_chamber_fan2: ""
variable_bed_fan: ""
variable_nevermore_fan1: ""
variable_nevermore_fan2: ""
gcode:
  {% set v = printer["gcode_macro _PRINTER_VARS"] %}
  {% if v.chamber_fan1 %} SET_FAN_SPEED FAN={v.chamber_fan1} SPEED=0.0 {% endif %}
  {% if v.chamber_fan2 %} SET_FAN_SPEED FAN={v.chamber_fan2} SPEED=0.0 {% endif %}
  {% if v.bed_fan %}       SET_FAN_SPEED FAN={v.bed_fan}       SPEED=0.0 {% endif %}
  {% if v.nevermore_fan1 %}SET_FAN_SPEED FAN={v.nevermore_fan1} SPEED=0.0 {% endif %}
  {% if v.nevermore_fan2 %}SET_FAN_SPEED FAN={v.nevermore_fan2} SPEED=0.0 {% endif %}