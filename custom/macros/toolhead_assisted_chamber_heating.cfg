# =====================
# TOOLHEAD_ASSISTED_CHAMBER_HEATING (derived on-the-fly; no hard-coded constants)
# =====================
[gcode_macro TOOLHEAD_ASSISTED_CHAMBER_HEATING]
description: Heat chamber with dynamic toolhead movement for optimal air mixing
gcode:
  # Params (accept both legacy and new names)
  {% set target_chamber = (params.CHAMBER if 'CHAMBER' in params else params.TARGET_CHAMBER)|default(_PRINTER_VARS.default_chamber_target)|float %}
  {% set bed_temp       = (params.BED     if 'BED'     in params else params.TARGET_BED)|default(110)|float %}
  {% set pattern        = params.PATTERN|default('auto')|lower %}
  {% set duration       = params.DURATION|default(_PRINTER_VARS.chamber_heat_duration)|int %}

  # Vars
  {% set vars = printer["gcode_macro _PRINTER_VARS"] %}
  {% set printhead_temp   = params.PRINTHEAD_TEMP|default(v.chamber_printhead_temp)|float %}
  {% set printhead_height = v.chamber_printhead_height|float %}
  {% set pc_fan           = v.chamber_printhead_fan_speed|float %}

  # Bounds/center
  {% set x_min = printer.toolhead.axis_minimum.x|float %}
  {% set x_max = printer.toolhead.axis_maximum.x|float %}
  {% set y_min = printer.toolhead.axis_minimum.y|float %}
  {% set y_max = printer.toolhead.axis_maximum.y|float %}
  {% set bed_size_x = x_max - x_min %}
  {% set bed_size_y = y_max - y_min %}
  {% set bed_size_avg = (bed_size_x + bed_size_y) / 2.0 %}

  # Margins & move speeds by size
  {% if bed_size_avg >= 400 %}
    {% set margin = 40 %}
    {% set move_speed = v.chamber_move_speed_fast|float %}
  {% elif bed_size_avg >= 300 %}
    {% set margin = 30 %}
    {% set move_speed = v.chamber_move_speed_medium|float %}
  {% else %}
    {% set margin = 20 %}
    {% set move_speed = v.chamber_move_speed_slow|float %}
  {% endif %}
  {% set f = (move_speed * 60)|int %}

  # Safe area & center
  {% set sx0 = x_min + margin %}
  {% set sx1 = x_max - margin %}
  {% set sy0 = y_min + margin %}
  {% set sy1 = y_max - margin %}
  {% set cx  = (x_min + x_max)/2.0 %}
  {% set cy  = (y_min + y_max)/2.0 %}
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set zrun = [printhead_height, max_z - 2]|min %}

  RESPOND MSG="Toolhead-assisted chamber heat: bed {bed_size_x|int}x{bed_size_y|int}mm, pattern={pattern}, speed {move_speed|int}mm/s, target {target_chamber}°C"

  # Home XY if needed
  {% set homed = printer.toolhead.homed_axes|string %}
  {% if not ("x" in homed and "y" in homed) %}
    G28 X Y
  {% endif %}

  # Start non-blocking heat & air circulation
  M140 S{bed_temp}
  M104 S{printhead_temp}
  CHAMBER_FANS_ON
  G90
  G1 Z{zrun} F{(v.z_travel_speed*60)|int}
  G1 X{cx} Y{cy} F{(v.travel_speed*60)|int}
  M106 S{(255 * pc_fan)|int}

  # Auto-select pattern if needed
  {% if pattern == 'auto' %}
    {% if bed_size_avg >= 400 %}
      {% set pattern = 'grid' %}
    {% elif bed_size_avg >= 300 %}
      {% set pattern = 'continuous' %}
    {% elif bed_size_avg >= 200 %}
      {% set pattern = 'corners' %}
    {% else %}
      {% set pattern = 'vortex' %}
    {% endif %}
    RESPOND MSG="Auto-selected '{pattern}' pattern"
  {% endif %}

  RESPOND MSG="Mixing air for ~{duration}s"

  # --- Patterns ---
  {% if pattern == 'grid' %}
    {% set loops = (duration // 30) if (duration // 30) > 0 else 1 %}
    {% for i in range(loops) %}
      G1 X{sx0} Y{sy0} F{f}
      G1 X{sx1} Y{sy0} F{f}
      G1 X{sx1} Y{sy1} F{f}
      G1 X{sx0} Y{sy1} F{f}
      G1 X{sx0} Y{sy0} F{f}
      {% for gx in range(3) %}
        {% for gy in range(3) %}
          {% set gxpos = sx0 + (gx * (sx1 - sx0) / 2.0) %}
          {% set gypos = sy0 + (gy * (sy1 - sy0) / 2.0) %}
          G1 X{gxpos} Y{gypos} F{f}
          G4 P500
        {% endfor %}
      {% endfor %}
      {% if (i % 2 == 0) and ("temperature_sensor chamber" in printer) %}
        RESPOND MSG="Chamber {(printer['temperature_sensor chamber'].temperature|float)|round(1)}°C / {target_chamber}°C"
      {% endif %}
    {% endfor %}

  {% elif pattern == 'continuous' %}
    {% set loops = (duration // 20) if (duration // 20) > 0 else 1 %}
    {% for i in range(loops) %}
      G1 X{sx0} Y{sy0} F{f}
      G1 X{sx1} Y{sy0} F{f}
      G1 X{sx1} Y{sy1} F{f}
      G1 X{sx0} Y{sy1} F{f}
      G1 X{sx0} Y{sy0} F{f}
      G1 X{cx} Y{sy0} F{f}
      G1 X{cx} Y{sy1} F{f}
      G1 X{cx} Y{cy}  F{f}
      G1 X{sx0} Y{cy} F{f}
      G1 X{sx1} Y{cy} F{f}
      G1 X{cx}  Y{cy} F{f}
      {% if (i % 3 == 0) and ("temperature_sensor chamber" in printer) %}
        RESPOND MSG="Chamber {(printer['temperature_sensor chamber'].temperature|float)|round(1)}°C / {target_chamber}°C"
      {% endif %}
    {% endfor %}

  {% elif pattern == 'corners' %}
    {% set loops = (duration // 15) if (duration // 15) > 0 else 1 %}
    {% for i in range(loops) %}
      G1 X{sx0} Y{sy0} F{f}
      G4 P2000
      G1 X{sx1} Y{sy0} F{f}
      G4 P2000
      G1 X{sx1} Y{sy1} F{f}
      G4 P2000
      G1 X{sx0} Y{sy1} F{f}
      G4 P2000
      G1 X{cx}  Y{cy}  F{f}
      G4 P1000
      {% if (i % 4 == 0) and ("temperature_sensor chamber" in printer) %}
        RESPOND MSG="Chamber {(printer['temperature_sensor chamber'].temperature|float)|round(1)}°C"
      {% endif %}
    {% endfor %}

  {% elif pattern == 'vortex' %}
    {% set loops = (duration // 25) if (duration // 25) > 0 else 1 %}
    {% set maxr = [sx1 - cx, sy1 - cy]|min %}
    {% for i in range(loops) %}
      {% for r in [1.0, 0.75, 0.5, 0.25] %}
        {% set R = r * maxr %}
        G1 X{cx + R}          Y{cy}          F{f}
        G1 X{cx + R*0.707}    Y{cy + R*0.707} F{f}
        G1 X{cx}              Y{cy + R}      F{f}
        G1 X{cx - R*0.707}    Y{cy + R*0.707} F{f}
        G1 X{cx - R}          Y{cy}          F{f}
        G1 X{cx - R*0.707}    Y{cy - R*0.707} F{f}
        G1 X{cx}              Y{cy - R}      F{f}
        G1 X{cx + R*0.707}    Y{cy - R*0.707} F{f}
      {% endfor %}
      {% if (i % 2 == 0) and ("temperature_sensor chamber" in printer) %}
        RESPOND MSG="Chamber {(printer['temperature_sensor chamber'].temperature|float)|round(1)}°C"
      {% endif %}
    {% endfor %}
  {% endif %}

  # Center, finalize temps (part cooling off only; chamber fans stay on)
  G1 X{cx} Y{cy} F{(v.travel_speed*60)|int}
  M190 S{bed_temp}
  M109 S{printhead_temp}
  M107

  # Report final status
  {% if "temperature_sensor chamber" in printer %}
    RESPOND MSG="Final chamber {(printer['temperature_sensor chamber'].temperature|float)|round(1)}°C (target {target_chamber}°C)"
  {% endif %}

  RESPOND MSG="Toolhead-assisted chamber heating complete"