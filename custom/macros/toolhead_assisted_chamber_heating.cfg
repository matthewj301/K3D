[gcode_macro TOOLHEAD_ASSISTED_CHAMBER_HEATING]
description: Mix air with toolhead moves until chamber reaches target, then finish
gcode:
  {% set v = printer["gcode_macro _PRINTER_VARS"] %}
  {% set target_chamber = params.TARGET_CHAMBER_TEMP|default(v.default_chamber_target)|float %}
  {% set bed_temp       = params.TARGET_BED|default(105)|float %}
  {% set extruder_temp  = params.EXTRUDER_TEMP|default(v.extruder_temp)|float %}
  {% set pattern_in     = params.PATTERN|default('auto')|lower %}

  ; derive bed size and move speed (mm/s -> mm/min)
  {% set x_min = printer.toolhead.axis_minimum.x|float %}
  {% set x_max = printer.toolhead.axis_maximum.x|float %}
  {% set y_min = printer.toolhead.axis_minimum.y|float %}
  {% set y_max = printer.toolhead.axis_maximum.y|float %}
  {% set bed_size_avg = ((x_max-x_min) + (y_max-y_min)) / 2.0 %}
  {% set move_speed = ( v.chamber_move_speed_fast if bed_size_avg >= 400
                        else (v.chamber_move_speed_medium if bed_size_avg >= 300
                              else v.chamber_move_speed_slow) )|float %}
  {% set f_mmpm = (move_speed * 60)|int %}

  ; margins & center
  {% set margin = 40 if bed_size_avg >= 400 else (30 if bed_size_avg >= 300 else 20) %}
  {% set sx0 = x_min + margin %}
  {% set sx1 = x_max - margin %}
  {% set sy0 = y_min + margin %}
  {% set sy1 = y_max - margin %}
  {% set cx  = (x_min + x_max)/2.0 %}
  {% set cy  = (y_min + y_max)/2.0 %}
  {% set z_height = [v.chamber_printhead_height|float, printer.toolhead.axis_minimum.z|float - 15]|min %}

  # pattern auto-select
  {% set pattern = pattern_in %}
  {% if pattern == 'auto' %}
    {% set pattern = 'grid' if bed_size_avg >= 400 else ('continuous' if bed_size_avg >= 300 
    else ('corners' if bed_size_avg >= 200 else 'vortex')) %}
  {% endif %}

  # chamber sensor
  {% set name = (v.chamber_sensor_name if v.chamber_sensor_name is defined else "chamber") %}
  {% set sensor_key = "temperature_sensor " ~ name %}
  {% if target_chamber <= 0 or sensor_key not in printer %}
    {action_raise_error("Chamber sensor missing or target=0")}
  {% endif %}

  # home XY if needed
  {% if not ('x' in printer.toolhead.homed_axes and 'y' in printer.toolhead.homed_axes) %} G28 XY {% endif %}

  # heat sources & staging
  M140 S{bed_temp}
  M104 S{extruder_temp}
  CHAMBER_FANS_ON
  G90
  G1 Z{z_height} F{(v.z_travel_speed*60)|int}
  G1 X{cx} Y{cy} F{(v.travel_speed*60)|int}
  M106 S{(255 * v.chamber_printhead_fan_speed|float)|int}

  #  start worker
  SET_GCODE_VARIABLE MACRO=_MIX_STATE VARIABLE=active    VALUE=1
  SET_GCODE_VARIABLE MACRO=_MIX_STATE VARIABLE=interval  VALUE={ (v.chamber_status_interval|default(2)|int) }
  SET_GCODE_VARIABLE MACRO=_MIX_STATE VARIABLE=f_mmpm    VALUE={ f_mmpm }
  SET_GCODE_VARIABLE MACRO=_MIX_STATE VARIABLE=sx0       VALUE={ sx0 }
  SET_GCODE_VARIABLE MACRO=_MIX_STATE VARIABLE=sx1       VALUE={ sx1 }
  SET_GCODE_VARIABLE MACRO=_MIX_STATE VARIABLE=sy0       VALUE={ sy0 }
  SET_GCODE_VARIABLE MACRO=_MIX_STATE VARIABLE=sy1       VALUE={ sy1 }
  SET_GCODE_VARIABLE MACRO=_MIX_STATE VARIABLE=cx        VALUE={ cx }
  SET_GCODE_VARIABLE MACRO=_MIX_STATE VARIABLE=cy        VALUE={ cy }
  SET_GCODE_VARIABLE MACRO=_MIX_STATE VARIABLE=z         VALUE={ z_height }
  SET_GCODE_VARIABLE MACRO=_MIX_STATE VARIABLE=pattern   VALUE='"{ pattern }"'
  SET_GCODE_VARIABLE MACRO=_MIX_STATE VARIABLE=step      VALUE=0
  SET_GCODE_VARIABLE MACRO=_MIX_STATE VARIABLE=vert_idx  VALUE=0
  SET_GCODE_VARIABLE MACRO=_MIX_STATE VARIABLE=ring_idx  VALUE=0
  UPDATE_DELAYED_GCODE ID=_MIX_TICK DURATION=0.1

  # block until target is reached (watch progress in UI)
  TEMPERATURE_WAIT SENSOR="{sensor_key}" MINIMUM={target_chamber}

  # stop worker and finish
  SET_GCODE_VARIABLE MACRO=_MIX_STATE VARIABLE=active VALUE=0
  UPDATE_DELAYED_GCODE ID=_MIX_TICK DURATION=0

  G1 X{cx} Y{cy} F{(v.travel_speed*60)|int}
  M190 S{bed_temp}
  M109 S{extruder_temp}
  M107
  RESPOND MSG="Chamber reached {target_chamber}°C — mixing complete"


[gcode_macro _MIX_STATE]
variable_active: 0
variable_interval: 2.0        # seconds between steps
variable_f_mmpm: 6000         # move speed (mm/min)
variable_sx0: 0.0
variable_sx1: 0.0
variable_sy0: 0.0
variable_sy1: 0.0
variable_cx: 0.0
variable_cy: 0.0
variable_z:  10.0
variable_pattern: "continuous" # continuous|grid|corners|vortex
variable_step: 0               # step index for continuous/grid/corners
variable_vert_idx: 0           # vortex vertex index (0..7)
variable_ring_idx: 0           # vortex ring index (0..3)
gcode:

[delayed_gcode _MIX_WORKER]
initial_duration: 0
gcode:
  {% set mix_state = printer["gcode_macro _MIX_STATE"] %}
  {% if mix_state.active|int == 1 %}
    {% set f  = mix_state.f_mmpm|int %}
    {% set x0 = mix_state.sx0|float %}{% set x1 = mix_state.sx1|float %}
    {% set y0 = mix_state.sy0|float %}{% set y1 = mix_state.sy1|float %}
    {% set cx = mix_state.cx|float   %}{% set cy = mix_state.cy|float   %}
    {% set z  = mix_state.z|float    %}

    G90
    G1 Z{z} F{f}

    {% if mix_state.pattern == "continuous" %}
      {% set k = mix_state.step|int %}
      {% if   k == 0  %} G1 X{x0} Y{y0} F{f}
      {% elif k == 1  %} G1 X{x1} Y{y0} F{f}
      {% elif k == 2  %} G1 X{x1} Y{y1} F{f}
      {% elif k == 3  %} G1 X{x0} Y{y1} F{f}
      {% elif k == 4  %} G1 X{x0} Y{y0} F{f}
      {% elif k == 5  %} G1 X{cx} Y{y0} F{f}
      {% elif k == 6  %} G1 X{cx} Y{y1} F{f}
      {% elif k == 7  %} G1 X{cx} Y{cy} F{f}
      {% elif k == 8  %} G1 X{x0} Y{cy} F{f}
      {% elif k == 9  %} G1 X{x1} Y{cy} F{f}
      {% elif k == 10 %} G1 X{cx} Y{cy} F{f}
      {% elif k == 11 %} G1 X{cx} Y{y0} F{f}
      {% endif %}
      SET_GCODE_VARIABLE MACRO=_MIX_STATE VARIABLE=step VALUE={ (k + 1) % 12 }

    {% elif mix_state.pattern == "grid" %}
      {% set k = mix_state.step|int %}
      {% set gx = [x0, (x0+x1)/2.0, x1] %}
      {% set gy = [y0, (y0+y1)/2.0, y1] %}
      {% set ix = (k % 3) %}{% set iy = (k // 3) %}
      G1 X{ gx[ix] } Y{ gy[iy] } F{f}
      ; optional short dwell to let fans mix
      G4 P300
      SET_GCODE_VARIABLE MACRO=_MIX_STATE VARIABLE=step VALUE={ (k + 1) % 9 }

    {% elif mix_state.pattern == "corners" %}
      {% set k = mix_state.step|int %}
      {% if   k == 0 %} G1 X{x0} Y{y0} F{f}
      {% elif k == 1 %} G4 P500
      {% elif k == 2 %} G1 X{x1} Y{y0} F{f}
      {% elif k == 3 %} G4 P500
      {% elif k == 4 %} G1 X{x1} Y{y1} F{f}
      {% elif k == 5 %} G4 P500
      {% elif k == 6 %} G1 X{x0} Y{y1} F{f}
      {% elif k == 7 %} G4 P500
      {% elif k == 8 %} G1 X{cx} Y{cy} F{f}
      {% elif k == 9 %} G4 P300
      {% endif %}
      SET_GCODE_VARIABLE MACRO=_MIX_STATE VARIABLE=step VALUE={ (k + 1) % 10 }

    {% elif mix_state.pattern == "vortex" %}
      {% set vx = mix_state.vert_idx|int %}
      {% set rx = mix_state.ring_idx|int %}
      {% set maxr = [x1 - cx, y1 - cy]|min %}
      {% set rings = [1.0, 0.75, 0.5, 0.25] %}
      {% set R = rings[rx] * maxr %}
      {% if   vx == 0 %} G1 X{cx + R}          Y{cy}            F{f}
      {% elif vx == 1 %} G1 X{cx + R*0.707}    Y{cy + R*0.707}  F{f}
      {% elif vx == 2 %} G1 X{cx}              Y{cy + R}        F{f}
      {% elif vx == 3 %} G1 X{cx - R*0.707}    Y{cy + R*0.707}  F{f}
      {% elif vx == 4 %} G1 X{cx - R}          Y{cy}            F{f}
      {% elif vx == 5 %} G1 X{cx - R*0.707}    Y{cy - R*0.707}  F{f}
      {% elif vx == 6 %} G1 X{cx}              Y{cy - R}        F{f}
      {% elif vx == 7 %} G1 X{cx + R*0.707}    Y{cy - R*0.707}  F{f}
      {% endif %}
      {% set next_v = (vx + 1) % 8 %}
      SET_GCODE_VARIABLE MACRO=_MIX_STATE VARIABLE=vert_idx VALUE={ next_v }
      {% if next_v == 0 %}
        SET_GCODE_VARIABLE MACRO=_MIX_STATE VARIABLE=ring_idx VALUE={ (rx + 1) % 4 }
      {% endif %}

    {% else %}
      ; fallback: center
      G1 X{cx} Y{cy} F{f}
    {% endif %}

    UPDATE_DELAYED_GCODE ID=_MIX_WORKER DURATION={ mix_state.interval }
  {% endif %}
