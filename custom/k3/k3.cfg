[include /home/pi/printer_data/config/custom/k3/steppers.cfg]
[include /home/pi/printer_data/config/custom/k3/bed_mesh.cfg]
[include /home/pi/printer_data/config/custom/k3/z-tilt.cfg]
[include /home/pi/printer_data/config/custom/k3/sensorless-homing/*]

[resonance_tester]
probe_points:
    70,70,20 # Override this in printer.cfg to be the center of your bed.

[printer]
kinematics: cartesian
max_velocity: 700
max_accel: 10000 # change this to 7500 after commissioning
max_z_velocity: 10  
max_z_accel: 100
square_corner_velocity: 8.0 # start at 8, but then increase once you're sure assembly is sound

[extruder]
heater_pin: e_heater_pin
sensor_pin: e_sensor_pin
step_pin: e_step_pin