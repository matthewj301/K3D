[gcode_macro _MIX_STATE]
variable_is_active = 0
variable_step_interval_s = 2.0
variable_move_feed_mmpm = 6000
variable_safe_x_min = 0.0
variable_safe_x_max = 0.0
variable_safe_y_min = 0.0
variable_safe_y_max = 0.0
variable_center_x = 0.0
variable_center_y = 0.0
variable_mix_z_height = 10.0
variable_pattern_name = "continuous"
variable_grid_step_index = 0
variable_vortex_vertex_index = 0
variable_vortex_ring_index = 0
variable_bed_target_c = 0.0
variable_hotend_target_c = 0.0
variable_chamber_sensor_key = ""
variable_chamber_target_c = 0.0
gcode = 
	DYNAMIC_MACRO MACRO=_MIX_STATE {rawparams}

[gcode_macro TOOLHEAD_ASSISTED_CHAMBER_HEATING]
description = Mix air with toolhead moves until chamber reaches target, then finish
gcode = {% set pv = printer["gcode_macro _PRINTER_VARS"] %}
	{% set chamber_target_c = params.TARGET_CHAMBER_TEMP|default(pv.default_chamber_target)|float %}
	{% set bed_target_raw   = params.BED_TEMP if params.BED_TEMP is defined else (params.TARGET_BED if params.TARGET_BED is defined else 105) %}
	{% set bed_target_c     = bed_target_raw|float %}
	{% set hotend_target_c  = params.EXTRUDER_TEMP|default(pv.extruder_temp)|float %}
	{% set pattern_param    = params.PATTERN|default("auto")|lower %}
	{% set sensor_name         = pv.chamber_sensor_name if pv.chamber_sensor_name is defined else "chamber" %}
	{% set chamber_sensor_key  = "temperature_sensor " ~ sensor_name %}
	{% set x_min = printer.toolhead.axis_minimum.x|float %}
	{% set x_max = printer.toolhead.axis_maximum.x|float %}
	{% set y_min = printer.toolhead.axis_minimum.y|float %}
	{% set y_max = printer.toolhead.axis_maximum.y|float %}
	{% set bed_size_avg = ((x_max - x_min) + (y_max - y_min)) / 2.0 %}
	{% set move_speed_mmps = pv.chamber_move_speed_fast|float %}
	{% set bed_margin = 40 %}
	{% set move_speed_mmps = pv.chamber_move_speed_medium|float %}
	{% set bed_margin = 30 %}
	{% set move_speed_mmps = pv.chamber_move_speed_slow|float %}
	{% set bed_margin = 20 %}
	{% set move_feed_mmpm = (move_speed_mmps * 60)|int %}
	{% set safe_x_min    = x_min + bed_margin %}
	{% set safe_x_max    = x_max - bed_margin %}
	{% set safe_y_min    = y_min + bed_margin %}
	{% set safe_y_max    = y_max - bed_margin %}
	{% set center_x      = (x_min + x_max) / 2.0 %}
	{% set center_y      = (y_min + y_max) / 2.0 %}
	{% set z_req         = pv.chamber_printhead_height|float %}
	{% set z_min         = printer.toolhead.axis_minimum.z|float %}
	{% set z_max         = printer.toolhead.axis_maximum.z|float %}
	{% set mix_z_height  = z_req %}
	{% if mix_z_height > (z_max - 2) %}{% set mix_z_height = z_max - 2 %}{% endif %}
	{% if mix_z_height < (z_min + 2) %}{% set mix_z_height = z_min + 2 %}{% endif %}
	{% set pattern_name = pattern_param %}
	{% set pattern_name = "grid" %}
	{% set pattern_name = "continuous" %}
	{% set pattern_name = "corners" %}
	{% set pattern_name = "vortex" %}
	DYNAMIC_MACRO MACRO=TOOLHEAD_ASSISTED_CHAMBER_HEATING {rawparams}

