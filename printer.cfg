[include /home/pi/printer_data/config/custom/mcus/*]

# Firmware retraction
[firmware_retraction]
retract_speed: 60
unretract_extra_length: 0
unretract_speed: 60
retract_length: 0.5

[extruder]
nozzle_diameter: 0.5
dir_pin: !PC1
control: pid
#pid_kp = 16.929
#pid_ki = 0.795
#pid_kd = 90.154

[heater_bed]
control: pid
heater_pin: heater_bed_heating_pin
sensor_pin: heater_bed_sensor_pin
sensor_type: Generic 3950
min_temp: 0
max_temp: 140
pwm_cycle_time: 0.02 # 50hz for european AC, to avoid flickering lights.

#pid_Kp: 22.2
#pid_Ki: 1.08
#pid_Kd: 114

[resonance_tester]
#accel_chip_x: adxl345 toolboard_t0
#accel_chip_y: adxl345 toolboard_t0
accel_chip_x: beacon
accel_chip_y: beacon
accel_per_hz: 100
sweeping_accel: 400
sweeping_period: 0


[include /home/pi/printer_data/config/custom/k3/k3.cfg]
[include /home/pi/printer_data/config/custom/extruders/sherpa_mini-8t.cfg]
[include /home/pi/printer_data/config/custom/hotends/tk.cfg]
[include /home/pi/printer_data/config/custom/probes/beacon.cfg]
[include /home/pi/printer_data/config/custom/fans/*]
[include /home/pi/printer_data/config/custom/sensors/*]
